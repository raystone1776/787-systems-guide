<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>787 Systems Study Guide</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6; display: flex; flex-direction: column;
            align-items: center; padding: 40px 20px; color: #333; margin: 0;
        }
        
        /* --- LOGIN SCREEN --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a365d; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .login-box { background: white; padding: 40px; border-radius: 12px; text-align: center; }
        .login-box input { padding: 10px; font-size: 16px; margin: 10px 0; }
        
        /* --- SETUP / LANDING SCREEN --- */
        #setup-screen { display: none; width: 100%; max-width: 600px; text-align: center; }
        .setup-card {
            background: white; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 30px; margin-bottom: 20px;
        }
        .setup-section { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
        .setup-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;}
        .cat-btn { background: #e2e8f0; color: #1a365d; padding: 12px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; transition: 0.2s;}
        .cat-btn:hover { background: #cbd5e1; }
        .primary-btn { background: #2b6cb0; color: white; padding: 12px 24px; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s;}
        .primary-btn:hover { background: #2c5282; }
        .random-box { display: flex; justify-content: center; gap: 10px; margin-top: 15px;}
        .random-box input { padding: 10px; width: 80px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; text-align: center;}

        /* --- MAIN APP --- */
        #app-content { display: none; width: 100%; max-width: 600px; }
        
        .header-controls { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
        .stats-box { text-align: right; }
        #progress { font-weight: bold; color: #718096; font-size: 14px; margin-bottom: 5px;}
        #scoreboard { font-weight: bold; color: #2b6cb0; font-size: 18px; }
        .back-btn { background: #718096; padding: 8px 16px; font-size: 14px;}
        .back-btn:hover { background: #4a5568;}

        /* The Card */
        .card {
            background: white; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 30px; margin-bottom: 20px; min-height: 300px; display: flex; flex-direction: column;
        }
        h2 { font-size: 20px; margin-bottom: 20px; color: #1a365d; line-height: 1.4; }
        
        /* Options */
        .option {
            background: #e2e8f0; padding: 12px 15px; margin: 8px 0;
            border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 500;
        }
        .option:hover:not(.disabled) { background: #cbd5e1; }
        .correct { background: #48bb78 !important; color: white; border: 2px solid #2f855a;}
        .wrong { background: #f56565 !important; color: white; border: 2px solid #c53030;}
        .disabled { pointer-events: none; }
        
        .card-footer { margin-top: auto; padding-top: 20px; font-size: 13px; color: #a0aec0; text-align: center; font-style: italic;}

        /* Buttons */
        .controls { display: flex; justify-content: space-between; width: 100%; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: #1a365d;">787 Study Guide</h2>
            <input type="password" id="pass-input" placeholder="Enter Password" onkeypress="if(event.key === 'Enter') checkPassword()" />
            <br><button class="primary-btn" style="width:auto; margin-top:10px;" onclick="checkPassword()">Login</button>
            <p id="error-msg" style="color: red; display: none; margin-top: 10px;">Incorrect password.</p>
        </div>
    </div>

    <div id="setup-screen">
        <h1 style="color: #1a365d;">Choose Your Session</h1>
        <div class="setup-card">
            
            <div class="setup-section">
                <button class="primary-btn" onclick="startSession('all')">Study All Questions</button>
            </div>

            <div class="setup-section">
                <h3 style="margin:0 0 10px 0; color: #4a5568;">Random Mix</h3>
                <div class="random-box">
                    <input type="number" id="random-count" placeholder="Qty" min="1" max="1000" value="20">
                    <button class="primary-btn" style="width: auto;" onclick="startSession('random')">Start Mix</button>
                </div>
            </div>

            <div class="setup-section">
                <h3 style="margin:0 0 10px 0; color: #4a5568;">Study by System</h3>
                <div class="category-grid" id="category-buttons">
                    </div>
            </div>

        </div>
    </div>

    <div id="app-content">
        <div class="header-controls">
            <button class="primary-btn back-btn" onclick="goBackToMenu()">← Back to Menu</button>
            <div class="stats-box">
                <div id="progress">Loading...</div>
                <div id="scoreboard">Score: 0 / 0 (0%)</div>
            </div>
        </div>

        <div class="card">
            <h2 id="question-text">Loading questions...</h2>
            <div id="options-container"></div>
            <div class="card-footer" id="card-footer">Section Info</div>
        </div>

        <div class="controls">
            <button class="primary-btn" style="width: 48%;" id="prev-btn" onclick="prevQuestion()">Previous</button>
            <button class="primary-btn" style="width: 48%;" id="next-btn" onclick="nextQuestion()">Next</button>
        </div>
    </div>

    <script>
        // --- LOGIN LOGIC ---
        function checkPassword() {
            if (document.getElementById('pass-input').value === 'F1y787$') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('setup-screen').style.display = 'block';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        // --- GLOBALS ---
        let allQuestions = [];
        let currentQuestions = [];
        let currentIndex = 0;
        let correctAnswers = 0;
        let totalAttempts = 0;
        let hasGuessed = []; // Array to track if a question has been answered yet

        // Fetch JSON
        fetch('787_questions.json')
            .then(response => response.json())
            .then(data => {
                allQuestions = data;
                populateSetupMenu();
            })
            .catch(err => {
                document.getElementById('setup-screen').innerHTML = "<h3 style='color:red;'>Error: Could not load database. Make sure server is running!</h3>";
                console.error(err);
            });

        // Build the Category Buttons for the Setup Screen
        function populateSetupMenu() {
            const container = document.getElementById('category-buttons');
            // Extract unique full categories
            const uniqueCats = [...new Set(allQuestions.map(q => q.category))].filter(Boolean);
            
            uniqueCats.forEach(fullCat => {
                let btn = document.createElement('button');
                btn.className = 'cat-btn';
                // Clean the name for the button (removes the "[FM 8.10]" part)
                let cleanName = fullCat.split('[')[0].trim();
                btn.innerText = cleanName;
                // Pass the full category name so we can filter exactly
                btn.onclick = () => startSession('category', fullCat);
                container.appendChild(btn);
            });
        }

        // --- SESSION STARTER ---
        function startSession(type, param) {
            if (type === 'all') {
                currentQuestions = [...allQuestions];
            } 
            else if (type === 'random') {
                let qty = parseInt(document.getElementById('random-count').value);
                if (isNaN(qty) || qty < 1) qty = 20; // fallback
                // Shuffle array and slice the requested amount
                let shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
                currentQuestions = shuffled.slice(0, qty);
            } 
            else if (type === 'category') {
                // Filter by the exact full category string
                currentQuestions = allQuestions.filter(q => q.category === param);
            }

            // Reset tracking
            currentIndex = 0;
            correctAnswers = 0;
            totalAttempts = 0;
            hasGuessed = new Array(currentQuestions.length).fill(false);
            
            updateScoreboard();
            loadQuestion();

            // Switch views
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
        }

        function goBackToMenu() {
            document.getElementById('app-content').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'block';
        }

        // --- APP LOGIC ---
        function loadQuestion() {
            if (currentQuestions.length === 0) return;
            
            const q = currentQuestions[currentIndex];
            document.getElementById('progress').innerText = `Q: ${currentIndex + 1} / ${currentQuestions.length}`;
            document.getElementById('question-text').innerText = q.question;
            
            // Set the full category info at the bottom
            document.getElementById('card-footer').innerText = q.category || "Unknown Section";
            
            const container = document.getElementById('options-container');
            container.innerHTML = ''; 
            
            q.options.forEach(opt => {
                let div = document.createElement('div');
                div.className = 'option';
                // If they already guessed this question earlier, lock it to prevent cheating
                if (hasGuessed[currentIndex]) {
                    div.classList.add('disabled');
                }
                
                div.innerText = opt;
                div.dataset.letter = opt.charAt(0).toLowerCase(); 
                div.onclick = () => gradeAnswer(div, q.answer);
                container.appendChild(div);
            });

            document.getElementById('prev-btn').disabled = currentIndex === 0;
            document.getElementById('next-btn').disabled = currentIndex === currentQuestions.length - 1;
        }

        function gradeAnswer(selectedDiv, correctLetter) {
            // Prevent grading again if already guessed
            if (hasGuessed[currentIndex]) return;
            hasGuessed[currentIndex] = true;

            const allOptions = document.querySelectorAll('.option');
            const selectedLetter = selectedDiv.dataset.letter;

            totalAttempts++;

            allOptions.forEach(opt => {
                opt.classList.add('disabled'); 
                if (opt.dataset.letter === correctLetter) {
                    opt.classList.add('correct');
                }
            });

            if (selectedLetter === correctLetter) {
                correctAnswers++;
            } else {
                selectedDiv.classList.add('wrong');
            }

            updateScoreboard();
        }

        function updateScoreboard() {
            let percentage = totalAttempts === 0 ? 0 : Math.round((correctAnswers / totalAttempts) * 100);
            document.getElementById('scoreboard').innerText = `Score: ${correctAnswers} / ${totalAttempts} (${percentage}%)`;
        }

        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) { currentIndex++; loadQuestion(); }
        }

        function prevQuestion() {
            if (currentIndex > 0) { currentIndex--; loadQuestion(); }
        }
    </script>
</body>
</html>
